plugin_spec_version: v2
extension: plugin
products: [insightconnect]
name: teamdynamix
title: TeamDynamix
description: >
  TeamDynamix is an IT Service Management (ITSM) and Project Portfolio Management 
  platform. This plugin allows users to create, read, update, and search tickets 
  within a TeamDynamix instance, enabling automated ticketing workflows.
version: 1.0.0
connection_version: 1
vendor: rapid7
support: rapid7
status: []
cloud_ready: false
resources:
  vendor_url: https://www.teamdynamix.com/
  source_url: https://github.com/rapid7/insightconnect-plugins/tree/master/plugins/teamdynamix
tags:
  - teamdynamix
  - itsm
  - ticketing
  - remediation
hub_tags:
  use_cases: [remediation_management]
  keywords: [itsm]
  features: []
sdk:
  type: slim
  version: 6.5.0
  user: nobody
supported_versions:
  - TeamDynamix Web API
key_features:
  - Create TeamDynamix tickets to initiate remediation workflows
  - Get ticket details to monitor ticket status
  - Update existing tickets with new information or status
  - Search tickets by various criteria

requirements:
  - TeamDynamix instance base URL (e.g., https://yourorg.teamdynamix.com)
  - TeamDynamix Web API BEID and Web Services Key for authentication
  - Application ID for the target TeamDynamix application

links:
  - '[TeamDynamix](https://www.teamdynamix.com/)'
  - '[TeamDynamix Web API](https://solutions.teamdynamix.com/TDWebApi/)'

references:
  - '[TeamDynamix Web API Documentation](https://solutions.teamdynamix.com/TDWebApi/)'

troubleshooting:
  - Ensure your BEID and Web Services Key are correct and have not expired.
  - Verify the Application ID matches the target TeamDynamix application.
  - The base URL should not include a trailing slash.

version_history:
  - 1.0.0 - Initial plugin release with Create, Get, Update, and Search Ticket actions

connection:
  base_url:
    title: Base URL
    description: The base URL of your TeamDynamix instance (e.g., https://yourorg.teamdynamix.com)
    type: string
    required: true
    example: https://yourorg.teamdynamix.com
  beid:
    title: BEID
    description: The BEID (Back End Identifier) from TeamDynamix Admin
    type: string
    required: true
    example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  web_services_key:
    title: Web Services Key
    description: The Web Services Key from TeamDynamix Admin
    type: credential_secret_key
    required: true
    example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  app_id:
    title: Application ID
    description: The numeric Application ID for the TeamDynamix ticketing application
    type: integer
    required: true
    example: 42

actions:
  create_ticket:
    title: Create Ticket
    description: Create a new ticket in TeamDynamix, use this action to open remediation tickets
    input:
      title:
        title: Title
        description: Short title/subject of the ticket
        type: string
        required: true
        example: Remediate Critical Vulnerability CVE-2024-1234
      description:
        title: Description
        description: Full description of the ticket
        type: string
        required: false
        example: Critical vulnerability found on host 192.168.1.10
      type_id:
        title: Type ID
        description: Numeric ID of the ticket type in TeamDynamix
        type: integer
        required: true
        example: 123
      form_id:
        title: Form ID
        description: Numeric ID of the ticket form in TeamDynamix
        type: integer
        required: false
        example: 456
      account_id:
        title: Account/Department ID
        description: Numeric ID of the account or department
        type: integer
        required: true
        example: 789
      priority_id:
        title: Priority ID
        description: Numeric ID of the priority level in TeamDynamix
        type: integer
        required: true
        example: 20
      status_id:
        title: Status ID
        description: Numeric ID of the initial ticket status in TeamDynamix
        type: integer
        required: true
        example: 602
      requestor_email:
        title: Requestor Email
        description: Email address of the ticket requestor
        type: string
        required: true
        example: user@example.com
      responsible_group_id:
        title: Responsible Group ID
        description: Numeric ID of the group responsible for the ticket
        type: integer
        required: false
        example: 100
      additional_fields:
        title: Additional Fields
        description: JSON object of additional fields to include in the ticket payload (e.g., custom attributes)
        type: object
        required: false
        example: '{"StatusID": 602}'
    output:
      ticket_id:
        title: Ticket ID
        description: Numeric ID of the newly created ticket
        type: integer
        required: true
        example: 12345
      ticket_url:
        title: Ticket URL
        description: Direct URL to the created ticket in TeamDynamix
        type: string
        required: true
        example: https://yourorg.teamdynamix.com/TDClient/42/Requests/TicketDet?TicketID=12345
      success:
        title: Success
        description: Whether the ticket was created successfully
        type: boolean
        required: true
        example: true

  get_ticket:
    title: Get Ticket
    description: Retrieve a TeamDynamix ticket by its ID
    input:
      ticket_id:
        title: Ticket ID
        description: The numeric ID of the ticket to retrieve
        type: integer
        required: true
        example: 12345
    output:
      ticket:
        title: Ticket
        description: The full ticket object returned by TeamDynamix
        type: object
        required: true
        example: '{"ID": 12345, "Title": "Test Ticket", "StatusName": "New"}'
      title:
        title: Title
        description: Title of the ticket
        type: string
        required: false
        example: Test Ticket
      status:
        title: Status
        description: Current status of the ticket
        type: string
        required: false
        example: New
      ticket_id:
        title: Ticket ID
        description: Numeric ID of the ticket
        type: integer
        required: false
        example: 12345

  update_ticket:
    title: Update Ticket
    description: Update an existing TeamDynamix ticket
    input:
      ticket_id:
        title: Ticket ID
        description: The numeric ID of the ticket to update
        type: integer
        required: true
        example: 12345
      title:
        title: Title
        description: New title for the ticket
        type: string
        required: false
        example: Updated title
      description:
        title: Description
        description: New description for the ticket
        type: string
        required: false
        example: Updated description
      status_id:
        title: Status ID
        description: New status ID for the ticket
        type: integer
        required: false
        example: 602
      priority_id:
        title: Priority ID
        description: New priority ID for the ticket
        type: integer
        required: false
        example: 20
      additional_fields:
        title: Additional Fields
        description: JSON object of additional fields to update
        type: object
        required: false
        example: '{"AssignedAppID": 42}'
    output:
      success:
        title: Success
        description: Whether the ticket was updated successfully
        type: boolean
        required: true
        example: true

  search_tickets:
    title: Search Tickets
    description: Search for tickets in TeamDynamix
    input:
      search_text:
        title: Search Text
        description: Text to search in ticket titles and descriptions
        type: string
        required: false
        example: CVE-2024
      status_id:
        title: Status ID
        description: Filter by status ID
        type: integer
        required: false
        example: 602
      max_results:
        title: Max Results
        description: Maximum number of tickets to return (default 25)
        type: integer
        required: false
        default: 25
        example: 25
    output:
      tickets:
        title: Tickets
        description: List of matching ticket objects
        type: "[]object"
        required: true
        example: '[{"ID": 12345, "Title": "Test Ticket"}]'
      count:
        title: Count
        description: Number of tickets returned
        type: integer
        required: true
        example: 1
