plugin_spec_version: v2
extension: plugin
products: [ insightconnect ]
name: bitdefender_gravityzone_comprehensive
title: Bitdefender GravityZone Comprehensive
vendor: nleech
support: community
status: []
supported_versions: [ "GravityZone Cloud" ]
description: "Comprehensive integration exposing documented Bitdefender GravityZone Public API endpoints, including asset listing and endpoint isolation capabilities."
version: 2.0.0

resources:
  source_url: https://github.com/nleech/insightconnect-plugins/tree/master/plugins/bitdefender_gravityzone_comprehensive
  license_url: https://github.com/nleech/insightconnect-plugins/blob/master/LICENSE
  vendor_url: https://www.bitdefender.com

hub_tags:
  use_cases: [ endpoint_security ]
  keywords: [ bitdefender, gravityzone ]
  features: []

# This matches the rigid types framework of the cortex layout
types:
  endpoint_item:
    id:
      title: Endpoint ID
      type: string
      required: true
    name:
      title: Endpoint Name
      type: string
      required: false
    label:
      title: Label
      type: string
      required: false
    fqdn:
      title: FQDN
      type: string
      required: false
    ip:
      title: IP Address
      type: string
      required: false
    macs:
      title: MAC Addresses
      type: '[]string'
      required: false
    groupName:
      title: Group Name
      type: string
      required: false
    isIsolated:
      title: Is Isolated
      type: boolean
      required: false

  task_result:
    taskId:
      title: Task ID
      type: string
      required: true
    success:
      title: Success Status
      type: boolean
      required: true

connection:
  url:
    type: string
    title: Access URL
    description: The base GravityZone Control Center Access URL
    example: "https://cloud.gravityzone.bitdefender.com"
    required: true
  api_key:
    type: credential_secret_key
    title: API Key
    description: GravityZone API key with required service rights
    example: "9de5069c5afe602b2ea0a04b66beb2c0"
    required: true

actions:
  get_endpoints_list:
    title: Get Endpoints List
    description: "Returns a list of endpoints managed by Bitdefender GravityZone based on filter criteria"
    input:
      service_group:
        title: Service Group
        type: string
        description: The targeted API endpoint route
        default: "network"
        example: "network"
        required: true
      api_version:
        title: API Version
        type: string
        description: Version pathway context
        default: "v1.0"
        example: "v1.0"
        required: true
      page:
        title: Page Number
        type: integer
        description: Page number to return
        default: 1
        example: 1
        required: false
      perPage:
        title: Items Per Page
        type: integer
        description: Number of items per page
        default: 30
        example: 30
        required: false
    output:
      endpoints:
        title: Endpoints List
        type: '[]endpoint_item'
        description: List of matching endpoints found
        required: true

  create_isolate_endpoint_task:
    title: Create Isolate Endpoint Task
    description: "Isolates a target managed endpoint cleanly from network communications"
    input:
      service_group:
        title: Service Group
        type: string
        description: The targeted API endpoint route
        default: "network"
        example: "network"
        required: true
      api_version:
        title: API Version
        type: string
        description: Version pathway context
        default: "v1.0"
        example: "v1.0"
        required: true
      endpoint_id:
        title: Endpoint ID
        type: string
        description: The target device string unique identifier
        example: "602beea0a04b66b12a6ed3c9"
        required: true
    output:
      task:
        title: Task Result
        type: task_result
        description: Isolation task details
        required: true