plugin_spec_version: v2
extension: plugin
products: [insightconnect]
name: bitdefender_gravityzone_comprehensive
title: Bitdefender GravityZone
vendor: rapid7
support: community
status: []
supported_versions: ["GravityZone Cloud API v1.0"]
description: Interact with Bitdefender GravityZone to manage endpoints, including listing managed devices and isolating compromised hosts
version: 1.0.0
connection_version: 1
sdk:
  type: slim
  version: 6.5.1
  user: nobody
resources:
  source_url: https://github.com/rapid7/insightconnect-plugins/tree/master/plugins/bitdefender_gravityzone_comprehensive
  license_url: https://github.com/rapid7/insightconnect-plugins/blob/master/LICENSE
  vendor_url: https://www.bitdefender.com
key_features:
  - List endpoints managed by Bitdefender GravityZone
  - Isolate compromised endpoints from the network
requirements:
  - Bitdefender GravityZone API key with appropriate permissions
  - Access to the GravityZone Control Center
links:
  - "[Bitdefender GravityZone](https://www.bitdefender.com/business/products/gravityzone-business-security.html)"
references:
  - "[GravityZone API Documentation](https://www.bitdefender.com/business/support/en/77209-128490-public-api.html)"
tags:
  - bitdefender
  - gravityzone
  - endpoint
  - isolation
hub_tags:
  use_cases: [threat_detection_and_response]
  keywords: [bitdefender, gravityzone, endpoint]
  features: []
version_history:
  - "1.0.0 - Initial plugin with Get Endpoints List and Isolate Endpoint actions"
enable_cache: false

types:
  endpoint_item:
    id:
      title: Endpoint ID
      description: The unique identifier of the endpoint
      type: string
      required: true
    name:
      title: Name
      description: The hostname of the endpoint
      type: string
      required: true
    label:
      title: Label
      description: Custom label assigned to the endpoint
      type: string
      required: false
    fqdn:
      title: FQDN
      description: Fully qualified domain name of the endpoint
      type: string
      required: false
    group_id:
      title: Group ID
      description: The ID of the group the endpoint belongs to
      type: string
      required: false
    is_managed:
      title: Is Managed
      description: Whether the endpoint has an active management agent
      type: boolean
      required: false
    machine_type:
      title: Machine Type
      description: "Type of machine: 1=Computer, 2=Virtual Machine, 3=EC2 Instance, 0=Other"
      type: integer
      required: false
    operating_system_version:
      title: Operating System Version
      description: The OS name and version
      type: string
      required: false
    ip:
      title: IP Address
      description: Primary IP address of the endpoint
      type: string
      required: false
    macs:
      title: MAC Addresses
      description: List of MAC addresses for the endpoint
      type: "[]string"
      required: false
    managed_with_best:
      title: Managed With BEST
      description: Whether Bitdefender Endpoint Security Tools is active
      type: boolean
      required: false

connection:
  url:
    title: Access URL
    description: The base GravityZone Control Center URL
    type: string
    required: true
    example: https://cloud.gravityzone.bitdefender.com
  api_key:
    title: API Key
    description: GravityZone API key with required service permissions
    type: credential_secret_key
    required: true
    example: 9de5069c5afe602b2ea0a04b66beb2c0

actions:
  get_endpoints_list:
    title: Get Endpoints List
    description: Returns a paginated list of endpoints managed by Bitdefender GravityZone
    input:
      parent_id:
        title: Parent ID
        description: The ID of the target company or group. If omitted, returns endpoints associated with the API key
        type: string
        required: false
        example: 5a4f2c3b6e9d1a0012345678
      is_managed:
        title: Is Managed
        description: Filter by management state. True returns only managed endpoints, False returns unmanaged
        type: boolean
        required: false
        example: true
      page:
        title: Page
        description: The page number to return
        type: integer
        required: false
        default: 1
        example: 1
      per_page:
        title: Per Page
        description: Number of items per page (1-100)
        type: integer
        required: false
        default: 30
        example: 30
      name_filter:
        title: Name Filter
        description: Partial match filter for endpoint names (minimum 3 characters)
        type: string
        required: false
        example: "workstation*"
    output:
      endpoints:
        title: Endpoints
        description: List of endpoint objects matching the filter criteria
        type: "[]endpoint_item"
        required: true
        example: [{"id": "5a4f2c3b6e9d1a0012345678", "name": "WORKSTATION-001"}]
      total:
        title: Total
        description: Total number of endpoints matching the criteria
        type: integer
        required: true
        example: 25
      pages_count:
        title: Pages Count
        description: Total number of available pages
        type: integer
        required: false
        example: 5
      page:
        title: Page
        description: The current page number returned
        type: integer
        required: true
        example: 1
      per_page:
        title: Per Page
        description: The number of items per page
        type: integer
        required: true
        example: 30

  isolate_endpoint:
    title: Isolate Endpoint
    description: Isolates a managed endpoint from the network to contain a potential threat
    input:
      endpoint_id:
        title: Endpoint ID
        description: The unique 24-character hex ID of the endpoint to isolate
        type: string
        required: true
        example: 5a4f2c3b6e9d1a0012345678
    output:
      success:
        title: Success
        description: Whether the isolation task was successfully created
        type: boolean
        required: true
        example: true
