  get_intelligence:
    title: Get Intelligence
    description: Make a query to the ANY.RUN Threat Intelligence database using flexible searches for Indicators of Compromise (IOCs), Indicators of Attack(IOAs), and Indicators of Behavior (IOBs) to investigate and gather extensive and in-depth information on cyber threats
    input:
      query:
        title: Query
        description: Raw query with necessary filters. Supports condition concatenation with AND, OR, NOT and Parentheses ()
        type: string
        required: true
        example: 'domainName:"\rvonline.hu" OR url:"*\rvonline.hu*"'
      lookup_depth:
        title: Lookup Depth
        description: Specify the number of days from the current date for which you want to lookup
        type: int
        required: false
        default: 180
        example: 180
    output:
      report:
        title: Lookup Summary
        description: Lookup Summary JSON
        type: file
        required: false
        example: file
      lookup_url:
        title: Lookup URL
        description: Link to the TI Lookup Query
        type: string
        required: false
        example: 'https://intelligence.any.run/analysis/lookup#{%22query%22:%22http://171.22.28.221/5c06c05b7b34e8e6.php%22,%22dateRange%22:180}'
  get_reputation:
    title: Get Reputation
    description: Check URL/IP/Domain/File reputation
    input:
      entity_type:
        title: Entity Type
        description: Entity type to search in database
        type: string
        required: true
        default: 'url'
        enum:
          - 'url'
          - 'hash'
          - 'destination_ip'
          - 'domain_name'
        example: 'url'
      entity_value:
        title: Entity Value
        description: URL (Size range 2-256) or Hash (SHA256, SAH1, MD5) or Domain or IP
        type: string
        required: true
        example: 'https://suspicious.url'
      lookup_depth:
        title: Lookup Depth
        description: Specify the number of days from the current date for which you want to lookup
        type: int
        required: false
        default: 180
        example: 180
    output:
      verdict:
        title: Analysis Verdict
        description: Analysis verdict. Can be 'Malicious', 'Suspicious' or 'No threads detected'
        type: string
        required: false
        example: 'Malicious'
      tags:
        title: Tags
        description: A comma-separated list of IOC-related tags
        type: string
        required: false
        example: 'asyncrat,stealer,botnet'
      industries:
        title: Industries
        description: A comma-separated list of IOC-related industries
        type: string
        required: false
        example: 'health,banking,finance'
      last_modified:
        title: Last Modified
        description: Last analysis date
        type: string
        required: false
        example: '2026-03-27 06:31:44'
      last_analyses:
        title: Last Analyses
        description: A comma-separated list of IOC-related analyses
        type: string
        required: false
        example: 'https://app.any.run/tasks/f3ebe6be-3089-42ab-8c16-2477250b30bc,https://app.any.run/tasks/f3ebe6be-3089-42ab-8c16-2912250b30bc'
      asowner:
        title: ASOwner
        description: IOC-related autonomous system owner
        type: string
        required: false
