          - '10'
          - '11'
          - 'server 2025'
        example: '10'
      env_bitness:
        title: Bitness
        description: Bitness of Operation System. Supports 32, 64 for Windows. 64 for Windows Server 2025
        type: int
        required: false
        default: 64
        enum:
          - 32
          - 64
        example: 64
      env_type:
        title: Type
        description: Environment preset type. You can select **development** env for OS Windows 10 x64. For all other cases, **complete** env is required
        type: string
        required: false
        default: 'complete'
        enum:
          - 'complete'
          - 'development'
        example: 'complete'
