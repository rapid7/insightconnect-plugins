plugin_spec_version: v2
extension: plugin
products: [insightconnect]
name: any_run
title: "ANY.RUN"
description: ANY.RUN Sandbox is an online interactive sandbox for malware analysis, a tool for detection, monitoring, and research of cyber threats in real time
version: 3.0.0
connection_version: 3
supported_versions: ["ANY.RUN API 2026-03-20"]
vendor: rapid7
support: partner
status: []
resources:
  source_url: https://github.com/rapid7/insightconnect-plugins/tree/master/plugins/any_run
  license_url: https://github.com/rapid7/insightconnect-plugins/blob/master/LICENSE
  vendor_url: https://any.run
tags:
  - anyrun
  - malware
  - threat intelligence
hub_tags:
  use_cases: [threat_detection_and_response]
  keywords: [malware_analysis, threat_intelligence]
  features: []
sdk:
  type: slim
  version: 6.4.3
  user: nobody
key_features:
  - Submit a file or URL to ANY.RUN for analysis using the following OS - Windows, Linux, Android
  - Retrieve report details for a given analysis ID in various formats - HTML, STIX, JSON
  - Retrieve malicious or suspicious IOCs for a given analysis ID.
  - View history of analysis tasks.
  - View analysis verdict.
  - Download analysis network traffic dumps.
  - Perform deep searches, look up threats online, and enrich your security solutions using ANY.RUN TI Lookup.
  - Retrieve IP, Domain, URL, MD5, SHA256, SHA1 reputation.
requirements:
  - Requires an ANY.RUN Sandbox or ANY.RUN TI Lookup API key without a prefix
  - ANY.RUN "Enterprise Suite" plan (API access required)
troubleshooting:
  - Configure the connection with either an API key without a prefix.
version_history:
  - "3.0.0 - Migrate to the ANY.RUN SDK | Update existing actions | Add new actions"
  - "2.0.0 - Actions: `Get Report` - Updated output schema types | Updated SDK to the latest version (6.4.0)"
  - "1.1.2 - Fix issue with file defaulting to Windows 7 32-Bit"
  - "1.1.1 - Fix issue with invalid inputs in Run Analysis action | Fix issue where Run Analysis action fails if optional inputs are provided as empty strings | Fix issue where Get Report action fails when fields in output contain `None` value | Improve error handling"
  - "1.1.0 - Allow user agent input when using URL type in Run Analysis action"
  - "1.0.0 - Initial plugin"
links:
  - "[ANY.RUN](https://any.run/)"
references:
  - "[ANY.RUN](https://any.run/)"
  - "[ANY.RUN API documentation](https://any.run/api-documentation/)"
  - "[ANY.RUN Integrations](https://any.run/integrations/)"
  - "[ANY.RUN SDK](https://github.com/anyrun/anyrun-sdk)"
types:
  hashes:
    ssdeep:
      title: Ssdeep
      description: Ssdeep hash
      type: string
      required: false
    head_hash:
      title: Head Hash
      description: Head hash
      type: string
      required: false
    sha256:
      title: SHA256
      description: SHA256 hash
      type: string
      required: false
    sha1:
      title: SHA1
      description: SHA1 hash
      type: string
      required: false
    md5:
      title: MD5
      description: MD5 hash
      type: string
      required: false
  analysis:
    verdict:
      title: Verdict
      description: Analysis verdict
      type: string
      required: true
      example: Malicious activity
    name:
      title: Name
      description: Analysis name
      type: string
      required: true
      example: 'setup.exe'
    related:
      title: Related
      description: Analysis related URL
      type: string
      required: true
      example: 'https://app.any.run/tasks/0cb5990e-7858-4455-a5f8-8d704051901b'
    pcap:
      title: PCAP
      description: Analysis PCAP URL
      type: string
      required: true
      example: 'https://content.any.run/tasks/0cb5990e-7858-4455-a5f8-8d704051901b/download/pcap'
    file:
      title: File
      description: Analysis file URL
      type: string
      required: true
      example: 'https://content.any.run/tasks/0cb5990e-7858-4455-a5f8-8d704051901b/download/files/005d7277-b4c1-4b96-bcd9-ac02b799eec9'
    json:
      title: JSON
      description: Analysis JSON URL
      type: string
      required: true
      example: 'https://api.any.run/report/0cb5990e-7858-4455-a5f8-8d704051901b/summary/json'
    misp:
      title: MISP
      description: Analysis MISP URL
      type: string
      required: true
      example: 'https://api.any.run/report/0cb5990e-7858-4455-a5f8-8d704051901b/summary/misp'
    tags:
      title: Tags
      description: Analysis tags
      type: '[]string'
      required: true
      example: '["suspicious"]'
    date:
      title: Date
      description: Analysis date
      type: string
      required: true
      example: 2020-04-17T18:44:37.483Z
    hashes:
      title: Hashes
      description: Analysis hashes
      type: hashes
      required: true
    uuid:
      title: UUID
      description: Analysis UUID
      type: string
      required: false
connection:
  sandbox_api_key:
    title: API Key
    description: API key for ANY.RUN Sandbox
    type: credential_secret_key
    required: false
    example: WbTbwa4KFk77eQNffMJynWXm49jLwGjwPMKM9Xc4
  ti_lookup_api_key:
    title: API Key
    description: API key for ANY.RUN TI Lookup
    type: credential_secret_key
    required: false
    example: WbTbwa4KFk77eQNffMJynWXm49jLwGjwPMKM9Xc4
actions:
  get_analysis_history:
    title: Get Analysis History
    description: Get last analyses from the user's history and their basic information
    input:
      team:
        title: Team
        description: Leave this field blank to get your history or specify to get team history
        type: boolean
        required: false
        default: false
        example: false
      skip:
        title: Skip
        description: Skip the specified number of analyses
        type: integer
        required: false
        default: 0
        example: 25
      limit:
        title: Limit
        description: Specify the number of analyses in the result set (not more than 100)
        type: integer
        required: false
        default: 0
        example: 25
    output:
      analyses:
        title: Analyses
        description: Analyses history
        required: false
        type: '[]analysis'
        example: '[{"related":"https://app.any.run/tasks/82ab98a6-b406-4ba5-8deb-...","json":"https://api.any.run/report/82ab98a6-b406-4ba5-8deb...","file":"https://content.any.run/tasks/82ab98a6-b406-4ba5-8...","hashes":{"head_hash":"0145ad575b213b1703cb94c6c3568a2e","md5":"926e6146fdb288e932a1846029ad07db","sha1":"fc73d7c62e324cad4240fbaf7a6d53716ecc4de7","sha256":"f6df99db2023558798d234f9c118497db8ec83da37682f8868...","ssdeep":"768:s+QiSf3rhTePO38fXbEmJS2Iro2wFW0kEeu:svXj5ePO3C..."},"misp":"https://api.any.run/report/82ab98a6-b406-4ba5-8deb...","name":"http://pastebin.com/raw/xGXyTALF","pcap":"https://content.any.run/tasks/82ab98a6-b406-4ba5-8...","tags":[],"verdict":"No threats detected","date":"2020-04-23T21:00:13.890Z"},{"date":"2020-04-20T02:14:11.452Z","file":"https://content.any.run/tasks/923fa62b-2689-4e6a-b...","hashes":{"sha256":"71f34b8bda00b54713e92cb8aee8c04a11ea5dea650b07f4b1...","ssdeep":"3:N1KdJMP2:CO2","head_hash":"780024dc16cb4331cdf98d18eb111bb4","md5":"780024dc16cb4331cdf98d18eb111bb4","sha1":"dfc3414b0e62c18787631322ae7a8c7489e845c9"},"json":"https://api.any.run/report/923fa62b-2689-4e6a-be76...","pcap":"https://content.any.run/tasks/923fa62b-2689-4e6a-b...","tags":[],"misp":"https://api.any.run/report/923fa62b-2689-4e6a-be76...","name":"http://clicnews.com","related":"https://app.any.run/tasks/923fa62b-2689-4e6a-be76-...","verdict":"Malicious activity"}]'
  get_analysis_report:
    title: Get Analysis Report
    description: Get detailed JSON, HTML or STIX report for analysis
    input:
      analysis_uuid:
        title: Analysis UUID
        description: Analysis UUID
        type: string
        required: true
        example: '0cf223f2-530e-4a50-b68f-563045268648'
      format:
        title: Report Format
        description: Report file in JSON, HTML or STIX format
        type: string
        required: false
        default: 'html'
        enum:
          - 'html'
          - 'json'
          - 'stix'
        example: 'json'
    output:
      report:
        title: Analysis Report
        description: Report file
        type: file
        required: false
        example: file
      analysis_uuid:
        title: Analysis UUID
        description: Analysis UUID
        type: string
        required: false
        example: '0cf223f2-530e-4a50-b68f-563045268648'
      analysis_url:
        title: Analysis URL
        description: Link to the interactive analysis
        type: string
        required: false
        example: '0cf223f2-530e-4a50-b68f-563045268648'
  get_analysis_verdict:
    title: Get Analysis Verdict
    description: Get the verdict of a specific analysis
    input:
      analysis_uuid:
        title: Analysis UUID
        description: Analysis UUID
        type: string
        required: true
        example: '0cf223f2-530e-4a50-b68f-563045268648'
    output:
      verdict:
        title: Analysis Verdict
        description: Analysis verdict. Can be 'Malicious', 'Suspicious' or 'No threads detected'
        type: string
        required: false
        example: 'Malicious'
  get_ioc:
    title: Get IOC
    description: Get malicious and suspicious IOCs in CSV format from the analysis if available
    input:
      analysis_uuid:
        title: Analysis UUID
        description: Analysis UUID
        type: string
        required: true
        example: '0cf223f2-530e-4a50-b68f-563045268648'
    output:
      report:
        title: Analysis IOCs
        description: Suspicious and Malicious IOCs CSV
        type: file
        required: false
        example: file
      count:
        title: IOCs Count
        description: The number of found IOCs
        type: int
        required: false
