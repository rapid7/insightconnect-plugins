        required: false
        default: 'bylink'
        enum:
          - 'public'
          - 'bylink'
          - 'owner'
          - 'byteam'
        example: 'bylink'
      opt_timeout:
        title: Timeout
        description: Timeout option, size range 10-660
        type: integer
        required: false
        default: 120
        example: 120
      opt_auto_delete_after:
        title: Auto Delete after
        description: Specify after what period of time this report should be deleted
        type: string
        required: false
        default: 'month'
        enum:
          - 'day'
          - 'week'
          - '2 weeks'
          - 'month'
        example: 'month'
      obj_ext_browser:
        title: Browser
        description: Browser name. Supports Google Chrome, Mozilla Firefox, Internet Explorer, Microsoft Edge for Windows 7, 10, 11. Microsoft Edge for Windows Server 2025
        type: string
        required: false
        default: 'Microsoft Edge'
        enum:
          - 'Microsoft Edge'
          - 'Google Chrome'
          - 'Mozilla Firefox'
          - 'Internet Explorer'
        example: 'Microsoft Edge'
      obj_ext_extension:
        title: Extension
        description: Change extension to valid
        type: boolean
        required: false
        default: true
        example: true
      user_tags:
        title: User Tags
        description: Append User Tags to new analysis. Only characters a-z, A-Z, 0-9, hyphen (-), and comma (,) are allowed. Max tag length - 16 characters. Max unique tags per analysis - 8
        type: string
        required: false
        default: 'insight-connect'
        example: 'insight-connect'
    output:
