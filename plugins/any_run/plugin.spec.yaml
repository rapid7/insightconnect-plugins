    title: Windows URL Analysis
    description: Run URL analysis using Windows VM
    input:
      obj_url:
        title: URL
        description: Target URL. Size range 5-512. Example -> (http/https)://(your-link)
        type: string
        required: true
        example: 'https://example.org'
      env_version:
        title: Version
        description: Version of OS. Supports 7, 10, 11, server 2025
