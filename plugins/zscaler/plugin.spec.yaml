connection:
  client_id:
    title: Client ID
    type: string
    description: OAuth Client ID from ZIdentity
    required: true
    example: "abc123-client-id"
  private_key:
    title: Private Key
    type: credential_asymmetric_key
    description: PEM private key for JWT signing (RS256)
    required: true
    example: '{"privateKey": "-----BEGIN RSA PRIVATE KEY-----..."}'
  vanity_domain:
    title: Vanity Domain
    type: string
    description: Customer vanity domain (e.g., mycompany)
    required: true
    example: mycompany
  cloud:
    title: Cloud
    type: string
    description: Zscaler cloud domain
    required: false
    default: zsapi.net
    example: zsapi.net
actions:
  lookup_url:
    title: Lookup URL
    description: Look up the categorization of a given set of URLs
    input:
      urls:
        title: URLs
        description: The given set of URLs or domains to be looked up
        type: "[]string"
        required: true
        example: ["example.com", "https://rapid7.com"]
    output:
      url_categorization:
        title: URL Categorization
        description: Information about given URLs
        type: "[]url_categorization"
        required: true
        example: [{"url":"example.com","urlClassifications":["REFERENCE_SITES","INTERNET_SERVICES"],"urlClassificationsWithSecurityAlert":[]},{"url":"rapid7.com","urlClassifications":["CORPORATE_MARKETING","PROFESSIONAL_SERVICES"],"urlClassificationsWithSecurityAlert":[]}]
  blacklist_url:
    title: Blacklist URL
    description: Add or remove URLs from a blacklist. These URLs will appear in the 'Blocked Malicious URLs' section on the Advanced Threats Policy page
    input:
      urls:
        title: URLs
        description: A given set of one or more URLs or domains to update in the blacklist
        type: "[]string"
        required: true
        example: ["www.example.com", "http://rapid7.com"]
      blacklist_state:
        title: Blacklist State
        description: True to blacklist a URL, false to unblacklist a URL
        type: boolean
        required: false
        default: true
        example: true
      activate_configuration:
        title: Activate Configuration
        description: Set to true to activate configuration changes
        type: boolean
        required: true
        default: false
        example: false
    output:
      success:
        title: Success
        description: Whether or not the request succeeded
        type: boolean
        required: true
        example: true
      status:
        title: Status
        description: Activation status for a configuration change
        type: string
        example: ACTIVE
        required: true
  get_sandbox_report_for_hash:
    title: Get Sandbox Report for Hash
    description: Get a full report for an MD5 hash of a file that was analyzed by Sandbox
    input:
      hash:
        title: Hash
        description: MD5 hash to get report
        type: string
        required: true
        example: 9de5069c5afe602b2ea0a04b66beb2c0
    output:
      full_report:
        title: Full Report
        description: Full report of an analyzed MD5 hash
        type: full_report
        required: true
        example: {"Full Details":{"Summary":{"Status":"COMPLETED","Category":"EXECS","FileType":"EXE","StartTime":1520333667,"Duration":520797},"Classification":{"Type":"MALICIOUS","Category":"ADWARE","Score":76,"DetectedMalware":"Adware.Generic.48627"},"FileProperties":{"FileType":"EXE","FileSize":23323,"MD5":"afcb861561f7416c5e852001d31f8921","SHA1":"1dce4aacf1e17418ebc05d6d2e9034a8271185f9","Sha256":"fc9003461e52006be0188e1fc1b7656c81e930ec78a93eb7ab21fdff3e566314","Issuer":"","DigitalCerificate":"","SSDeep":"384:YcBdTF8O3Fnp7JWmbiV2SBsJmnnB76RF/ewf4XXI9volVL9EFlfnvY1NvJml7Wc:lZF8OXJWmbLW0mnnp6X6rfLC3Osl6c","RootCA":""},"SystemSummary":[{"Risk":"LOW","Signature":"Binary contains paths to debug symbols","SignatureSources":["Not_a_virus.pdb source: 5A9E736319EE0000_5A9E736E00000000.exe"]}],"SecurityBypass":[{"Risk":"LOW","Signature":"Entrypoint lies outside standard sections","SignatureSources":["section where entry point is pointing to: .Stone"]}],"Persistence":[{"Risk":"LOW","Signature":"PE file contains sections with non-standard names","SignatureSources":["","section name: .Stone"]}]}}
  get_blacklist_url:
    title: Get Blacklist URL
    description: Get blacklisted URLs
    output:
      blacklisted_urls:
        title: Blacklisted URLs
        description: URLs added to the blacklist
        type: "[]string"
        required: false
        example: ["domain.com","example.com","example1.com","example2.com","example3.com","example4.com","example5.com"]
  get_users:
    title: Get Users
    description: Gets a list of all users and allows user filtering by name, department, or group. The name search parameter performs a partial match. The dept and group parameters perform a 'starts with' match
    input:
      name:
        title: Name
        description: Filters by user name
        type: string
        required: false
        example: John
      department:
        title: Department
        description: Filters by department name
        type: string
        required: false
        example: Department Name
      group:
        title: Group
        description: Filters by group name
        type: string
        required: false
        example: Group Name
      page:
        title: Page
        description: Specifies the page offset
        type: integer
        required: false
        example: 1
      pageSize:
        title: Page Size
        description: Specifies the page size
        type: integer
        required: false
        example: 100
    output:
      users:
        title: User
        description: List of organization users
        type: "[]user"
        required: false
        example: [{"id":123456789,"name":"Sample user","email":"user@example.com","groups":[{"id":123456789,"name":"Test Group"}],"department":{"id":123456789,"name":"Test Department"},"adminUser":false,"isNonEditable":false,"deleted":false}]
  delete_user:
    title: Delete User
    description: Deletes the user for the specified ID
    input:
      userId:
        title: User Id
        description: The unique identifier for the user
        type: integer
        required: true
        example: 12345678
    output:
      success:
        title: Success
        description: Whether or not the request succeeded
        type: boolean
        required: false
        example: true
  create_user:
    title: Create User
    description: Adds a new user. A user can belong to multiple groups, but can only belong to one department
    input:
      name:
        title: Name
        description: User name
        type: string
        required: true
        example: John
      email:
        title: Email
        description: User email consists of a user name and domain name. It does not have to be a valid email address, but it must be unique and its domain must belong to the organization
        type: string
        required: true
        example: user@example.com
      groupNames:
        title: Group Names
        description: List of groups a user belongs to
        type: "[]string"
        required: true
        example: [ 'Group Name' ]
      departmentName:
        title: Department Name
        description: Department a user belongs to
        type: string
        required: true
        example: Department Name
      comments:
        title: Comments
        description: Additional information about this user
        type: string
        required: false
        example: Example comment
      tempAuthEmail:
        title: Temporary Authentication Email
        description: If you enabled one-time tokens or links, enter the email address to which the Zscaler service sends the tokens or links. If this is empty, the service sends the email to the User email
        type: string
        required: false
        example: user@example.com
      password:
        title: Password
        description: User's password. Applicable only when authentication type is Hosted DB. Password strength must follow what is defined in the auth settings
        type: password
        required: true
        example: password12!
    output:
      user:
        title: User
        description: An organization user
        type: user
        required: false
        example: {"id":123456789,"name":"Sample user","email":"user@example.com","groups":[{"id":123456789,"name":"Test Group","idpId":123456789,"comments":"Sample comment"}],"department":{"id":123456789,"name":"Test Department","idpId":123456789,"comments":"Sample comment","deleted":false},"comments":"Sample comment","tempAuthEmail":"user@example.com","adminUser":false}
  get_url_category_by_name:
    title: Get URL Category by Name
    description: Get the URL category information for the specified name. Supports both predefined Zscaler categories and custom categories
    input:
      urlCategoryName:
        title: URL Category Name
        description: Name of the URL category to retrieve. Can be a predefined Zscaler category name or a custom category name
        type: string
        required: true
        example: "News and Media"
    output:
      urlCategory:
        title: URL Category
        description: Information about the given URL category
        type: urlCategory
        required: false
        example: {"id":"CUSTOM_01","configuredName":"Custom Category Example","superCategory":"USER_DEFINED","keywords":["key1"],"keywordsRetainingParentCategory":["test1"],"urls":["example.com"],"dbCategorizedUrls":[],"customCategory":true,"scopes":[{"type":"ORGANIZATION"},{"type":"DEPARTMENT","scopeEntities":[{"id":12345678,"name":"Test Department"}]},{"type":"LOCATION","scopeEntities":[{"id":12345678,"name":"Location Example"}]},{"scopeGroupMemberEntities":[],"type":"LOCATION","scopeEntities":[{"id":12345678,"name":"Location Group Example"}]}],"editable":true,"description":"Example Description","type":"URL_CATEGORY","val":123,"customUrlsCount":1,"urlsRetainingParentCategoryCount":0,"customIpRangesCount":0,"ipRangesRetainingParentCategoryCount":0}
  update_urls_of_url_category:
    title: Update URLs of URL Category
    description: Adds or removes URLs for the specified URL category. Supports both predefined Zscaler categories and custom categories
    input:
      urlCategoryName:
        title: URL Category Name
        description: Name of the URL category to update. Can be a predefined Zscaler category name or a custom category name
        type: string
        required: true
        example: "News and Media"
      action:
        title: Action
        description: The action applied to the URLs
        type: string
        enum:
          - "Add to the list"
          - "Remove from the list"
        required: true
        example: Add to the list
      urlList:
        title: URL List
        description: List of the URLs to be updated
        type: "[]string"
        required: true
        example: [ "example.com", "example1.com" ]
    output:
      urlCategory:
        title: URL Category
        description: Information about the updated URL category
        type: urlCategory
        required: false
        example: {"id":"CUSTOM_01","configuredName":"Custom Category Example","superCategory":"USER_DEFINED","keywords":["key1"],"keywordsRetainingParentCategory":["test1"],"urls":["example.com"],"dbCategorizedUrls":[],"customCategory":true,"scopes":[{"type":"ORGANIZATION"},{"type":"DEPARTMENT","scopeEntities":[{"id":12345678,"name":"Test Department"}]},{"type":"LOCATION","scopeEntities":[{"id":12345678,"name":"Location Example"}]},{"scopeGroupMemberEntities":[],"type":"LOCATION_GROUP","scopeEntities":[{"id":12345678,"name":"Location Group Example"}]}],"editable":true,"description":"Example Description","type":"URL_CATEGORY","val":123,"customUrlsCount":1,"urlsRetainingParentCategoryCount":0,"customIpRangesCount":0,"ipRangesRetainingParentCategoryCount":0}
  get_dlp_incidents:
    title: Get DLP Incidents
    description: Retrieve DLP incident data from Zscaler OneAPI with time range filtering and pagination support
    input:
      start_time:
        title: Start Time
        description: The start time for the DLP incidents query in ISO 8601 format (e.g., 2024-01-01T00:00:00+00:00)
        type: string
        required: true
        example: "2024-01-01T00:00:00+00:00"
      end_time:
        title: End Time
        description: The end time for the DLP incidents query in ISO 8601 format (e.g., 2024-01-02T00:00:00+00:00)
        type: string
        required: true
        example: "2024-01-02T00:00:00+00:00"
      next_link:
        title: Next Link
        description: Pagination token from a previous response to retrieve the next page of results
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
    output:
      incidents:
        title: Incidents
        description: List of DLP incidents matching the query
        type: "[]dlpIncident"
        required: false
        example: [{"id": 1, "eventTime": "2024-01-01T12:00:00+00:00", "dlpPolicy": "PCI", "severity": "HIGH"}]
      next_link:
        title: Next Link
        description: Pagination token to retrieve the next page of results. Empty if no more pages
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
  list_firewall_rules:
    title: List Firewall Rules
    description: List all firewall filtering rules with pagination support
    input:
      next_link:
        title: Next Link
        description: Pagination token from a previous response to retrieve the next page of results
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
      search:
        title: Search
        description: Filter rules by name (case-insensitive partial match). If provided, only rules whose name contains this string will be returned
        type: string
        required: false
        example: "Block"
    output:
      rules:
        title: Rules
        description: List of firewall filtering rules
        type: "[]firewallRule"
        required: false
        example: [{"id": 1, "name": "Block Malware", "state": "ENABLED", "action": "BLOCK_RESET"}]
      next_link:
        title: Next Link
        description: Pagination token to retrieve the next page of results. Empty if no more pages
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
  get_firewall_rule:
    title: Get Firewall Rule
    description: Get a specific firewall filtering rule by its ID
    input:
      rule_id:
        title: Rule ID
        description: The unique identifier of the firewall rule to retrieve
        type: integer
        required: true
        example: 12345
    output:
      rule:
        title: Rule
        description: The firewall filtering rule details
        type: firewallRule
        required: false
        example: {"id": 12345, "name": "Block Malware", "state": "ENABLED", "action": "BLOCK_RESET", "order": 1}
  create_firewall_rule:
    title: Create Firewall Rule
    description: Create a new firewall filtering rule
    input:
      rule_data:
        title: Rule Data
        description: The firewall rule configuration object containing rule properties such as name, state, action, and conditions
        type: object
        required: true
        example: {"name": "Block Malware", "state": "ENABLED", "action": "BLOCK_RESET", "order": 1}
    output:
      rule:
        title: Rule
        description: The created firewall filtering rule
        type: firewallRule
        required: false
        example: {"id": 12345, "name": "Block Malware", "state": "ENABLED", "action": "BLOCK_RESET", "order": 1}
  update_firewall_rule:
    title: Update Firewall Rule
    description: Update an existing firewall filtering rule
    input:
      rule_id:
        title: Rule ID
        description: The unique identifier of the firewall rule to update
        type: integer
        required: true
        example: 12345
      rule_data:
        title: Rule Data
        description: The updated firewall rule configuration object containing rule properties to modify
        type: object
        required: true
        example: {"name": "Block Malware Updated", "state": "ENABLED", "action": "BLOCK_RESET", "order": 1}
    output:
      rule:
        title: Rule
        description: The updated firewall filtering rule
        type: firewallRule
        required: false
        example: {"id": 12345, "name": "Block Malware Updated", "state": "ENABLED", "action": "BLOCK_RESET", "order": 1}
  get_web_logs:
    title: Get Web Logs
    description: Retrieve web transaction logs from Zscaler with time range filtering and pagination support
    input:
      start_time:
        title: Start Time
        description: The start time for the log query in ISO 8601 format (e.g., 2024-01-01T00:00:00+00:00)
        type: string
        required: true
        example: "2024-01-01T00:00:00+00:00"
      end_time:
        title: End Time
        description: The end time for the log query in ISO 8601 format (e.g., 2024-01-02T00:00:00+00:00)
        type: string
        required: true
        example: "2024-01-02T00:00:00+00:00"
      next_link:
        title: Next Link
        description: Pagination token from a previous response to retrieve the next page of results
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
    output:
      logs:
        title: Logs
        description: List of web transaction log entries
        type: "[]webLogEntry"
        required: false
        example: [{"datetime": "2024-01-01T12:00:00+00:00", "user": "user@example.com", "url": "https://example.com", "action": "ALLOWED"}]
      next_link:
        title: Next Link
        description: Pagination token to retrieve the next page of results. Empty if no more pages
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
  get_firewall_logs:
    title: Get Firewall Logs
    description: Retrieve firewall logs from Zscaler with time range filtering and pagination support
    input:
      start_time:
        title: Start Time
        description: The start time for the log query in ISO 8601 format (e.g., 2024-01-01T00:00:00+00:00)
        type: string
        required: true
        example: "2024-01-01T00:00:00+00:00"
      end_time:
        title: End Time
        description: The end time for the log query in ISO 8601 format (e.g., 2024-01-02T00:00:00+00:00)
        type: string
        required: true
        example: "2024-01-02T00:00:00+00:00"
      next_link:
        title: Next Link
        description: Pagination token from a previous response to retrieve the next page of results
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
    output:
      logs:
        title: Logs
        description: List of firewall log entries
        type: "[]firewallLogEntry"
        required: false
        example: [{"datetime": "2024-01-01T12:00:00+00:00", "sourceIP": "192.168.1.1", "destIP": "10.0.0.1", "action": "BLOCKED", "rule": "Block Malware"}]
      next_link:
        title: Next Link
        description: Pagination token to retrieve the next page of results. Empty if no more pages
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
  submit_threat_feed:
    title: Submit Threat Feed
    description: Submit custom threat indicators (IoCs) to a Zscaler threat feed
    input:
      feed_type:
        title: Feed Type
        description: The type of threat indicators to submit
        type: string
        required: true
        enum:
          - "IP"
          - "DOMAIN"
          - "URL"
        example: "IP"
      indicators:
        title: Indicators
        description: List of threat indicators to submit to the feed
        type: "[]string"
        required: true
        example: ["192.168.1.100", "10.0.0.50"]
      description:
        title: Description
        description: Optional description for the submitted threat indicators
        type: string
        required: false
        example: "Malicious IPs from incident response"
    output:
      success:
        title: Success
        description: Whether the threat feed submission was successful
        type: boolean
        required: true
        example: true
      submitted_count:
        title: Submitted Count
        description: The number of indicators successfully submitted
        type: integer
        required: true
        example: 2
  list_application_segments:
    title: List Application Segments
    description: List ZPA application segments with pagination support
    input:
      next_link:
        title: Next Link
        description: Pagination token from a previous response to retrieve the next page of results
        type: string
        required: false
