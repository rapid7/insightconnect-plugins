      next_link:
        title: Next Link
        description: Pagination token to retrieve the next page of results. Empty if no more pages
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
  get_application_segment:
    title: Get Application Segment
    description: Get a specific ZPA application segment by its ID
    input:
      segment_id:
        title: Segment ID
        description: The unique identifier of the ZPA application segment to retrieve
        type: string
        required: true
        example: "123456"
    output:
      segment:
        title: Segment
        description: The ZPA application segment details
        type: applicationSegment
        required: false
        example: {"id": "123456", "name": "Internal App", "enabled": true, "domainNames": ["app.internal.com"], "serverGroups": [{"id": "789"}]}
  list_server_groups:
    title: List Server Groups
    description: List ZPA server groups with pagination support
    input:
      next_link:
        title: Next Link
        description: Pagination token from a previous response to retrieve the next page of results
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
    output:
      groups:
        title: Groups
        description: List of ZPA server groups
        type: "[]serverGroup"
        required: false
        example: [{"id": "789", "name": "App Server Group", "enabled": true, "servers": [{"address": "10.0.0.1"}]}]
      next_link:
        title: Next Link
        description: Pagination token to retrieve the next page of results. Empty if no more pages
        type: string
        required: false
        example: "eyJwYWdlIjogMn0="
  get_server_group:
    title: Get Server Group
    description: Get a specific ZPA server group by its ID
    input:
      group_id:
        title: Group ID
        description: The unique identifier of the ZPA server group to retrieve
        type: string
        required: true
        example: "789"
    output:
      group:
        title: Group
        description: The ZPA server group details
        type: serverGroup
        required: false
        example: {"id": "789", "name": "App Server Group", "enabled": true, "servers": [{"address": "10.0.0.1"}], "applications": [{"id": "123456"}]}